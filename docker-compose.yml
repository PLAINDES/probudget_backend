services:
  app:
    build: .
    container_name: php_app
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db
    mem_limit: 512m

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civil_probudget
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    mem_limit: 512m

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
    mem_limit: 256m

volumes:
  db_data: