name: Deploy Backend

on:
  push:
    branches: [devsb]
  pull_request:
    branches: [devsb]

concurrency:
  group: ci-${{github.ref}}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"

      - name: Instalar dependencias
        run: composer install --no-progress --prefer-dist

      - name: Lint PHP
        run: ./vendor/bin/phpcs --standard=PSR12 --extensions=php public/ src/ -n

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar archivos via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          local_path: ./
          remote_path: /home/ftpceon/ftp/probudget/backend/

      - name: Regenerar autoloader y reconstruir
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ftpceon/ftp/probudget/backend
            composer dump-autoload
            docker compose down
            docker compose up -d --build
